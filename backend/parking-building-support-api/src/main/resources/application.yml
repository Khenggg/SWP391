spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parking_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

    show-sql: true
jwt:
  issuer: ${JWT_ISSUER:ParkingBuilding.CoreApi}
  audience: ${JWT_AUDIENCE:ParkingBuilding.Frontend}
  secret: ${JWT_SECRET:DEVELOPMENT_SECRET_KEY_FOR_LOCAL_TESTING_ONLY_2026_SWP391}
